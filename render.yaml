services:
  - type: web
    name: whasabi-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: DB_NAME
        value: whasabi_db
      - key: CORS_ORIGINS
        value: https://admin.whasabi.example.com
